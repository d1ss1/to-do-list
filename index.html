<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <style>
h1 { text-align: center; margin-top: 50px; color: LightSalmon; }
#controls {
  text-align: center;
}
#taskInput {
  color: DarkSalmon;
  padding: 8px 12px;
  border-radius: 7px;
  border: 1px solid LightSalmon;
  outline: none;
}

#addBtn {
  color: white;
  background: LightSalmon;
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

    </style>
</head>
<body>
<h1>To-do list</h1>
<div id="controls">
<input id="taskInput">
<button id="addBtn">Add Task</button>
</div>
<ul id="taskList">
  
</ul>
<script src="script.js"></script>
</body>
</html>
